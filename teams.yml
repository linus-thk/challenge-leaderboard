# Team-Registry der Live-Lastprognose-Challenge.
# Schema:
#   teams:
#     - id: <filename-safe, lowercase>     # erscheint im Pfad submissions/<id>/...
#       display_name: <freier String>      # erscheint im Leaderboard
#       github_handles: [<gh-handle>, ...] # darf PRs mergen
#       pseudo: true                       # optional: Pseudo-Team ohne CSV-
#                                          # Submissions; Scores werden zur
#                                          # Build-Zeit direkt aus den
#                                          # ENTSO-E-Daten abgeleitet
#       model_card_link: <URL>             # optional: Link zur Model Card;
#                                          # erzeugt eine Zeile in der Sektion
#                                          # "About the Models" des Leaderboards
#       software_link: <URL>               # optional: Link zum Reproduzierbar-
#                                          # keits-ZIP (Spalte "Software" in
#                                          # "About the Models")
#       group: <String>                    # optional: Gruppenkürzel (Spalte
#                                          # "Group" im Leaderboard); ohne ihn
#                                          # zeigt die Spalte einen Strich
#       certified: "Yes" | "No"            # optional: Reproduktions-Status,
#                                          # vom Veranstalter gepflegt nach
#                                          # Eingang eines Zertifikat-PDFs
#                                          # (Spalte "Certified" in "About the
#                                          # Models"): "Yes" -> Haken, sonst Strich
#       openssf: <URL>                     # optional: Link zur OpenSSF-Scorecard
#                                          # (Spalte "OpenSSF" in "About the
#                                          # Models"); ohne ihn "missing" + Warn-
#                                          # Icon (analog zur Model Card)
#
# Lehrende pflegen diese Datei manuell nach Eingang der Anmeldung.
# Jedes Team hat einen ENTSO-E-Geschwister-Eintrag <id>_entsoe (gleiche
# github_handles, display_name mit Zusatz "(ENTSO-E)"). Ausgenommen ist der
# eigenständige ENTSO-E-Pseudo-Eintrag `entsoe`.
