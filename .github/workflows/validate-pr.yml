name: Validate Submission PR

# Triggered on every PR (no `paths` filter) so the `validate` status check
# this workflow produces is available for branch protection on `main`.
# Non-submission PRs (e.g. automated score updates from score-daily.yml,
# workflow/config tweaks) pass through the Diff-prüfen step with a no-op.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Diff prüfen (genau eine CSV pro PR, sonst pass-through)
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- 'submissions/**')
          if [[ ${#CHANGED[@]} -eq 0 ]]; then
            echo "[validate] PR berührt keine Submission — pass-through (Non-Submission-Änderung)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ${#CHANGED[@]} -ne 1 ]]; then
            echo "::error::PR muss genau eine Submission ändern oder hinzufügen (gefunden: ${#CHANGED[@]})."
            printf '%s\n' "${CHANGED[@]}" >&2
            exit 1
          fi
          echo "path=${CHANGED[0]}" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v7
        if: steps.diff.outputs.skip != 'true'
        with:
          enable-cache: true

      - name: Python-Stack
        if: steps.diff.outputs.skip != 'true'
        run: uv sync --frozen

      - name: Submission validieren
        if: steps.diff.outputs.skip != 'true'
        env:
          PYTHONHASHSEED: "0"
        run: |
          uv run python scripts/validate_submission.py \
            --path "${{ steps.diff.outputs.path }}" \
            --teams teams.yml \
            --pr-author "${{ github.event.pull_request.user.login }}"

      - name: Auto-merge aktivieren
        # SCORE_BOT_TOKEN statt GITHUB_TOKEN: bei Fork-PRs ist
        # GITHUB_TOKEN auf die Berechtigungen des Forks beschränkt,
        # sodass `gh pr merge -R <upstream>` mit "Could not resolve
        # to a Repository" abbricht. Der Bot-Token hat Schreibrechte
        # auf das Upstream-Repo und funktioniert für Fork- wie
        # Branch-PRs gleich.
        if: success()
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.SCORE_BOT_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
