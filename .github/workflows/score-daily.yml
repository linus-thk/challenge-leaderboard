name: Daily Scoring

on:
  schedule:
    - cron: "0 7 * * *"     # tﾃ､glich 07:00 UTC (ENTSO-E final-load i. d. R. verfﾃｼgbar)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Manueller Score-Lauf fﾃｼr YYYY-MM-DD (leer = gestern UTC)"
        required: false
        default: ""

# Direkter `git push` auf `main` ist durch Branch Protection
# (`required_status_checks: ['validate']`) blockiert.  Wir routen den
# Score-Stand deshalb ﾃｼber einen automatisch erzeugten PR, den die
# pass-through-Variante von `validate-pr.yml` abnickt und der
# `peter-evans/enable-pull-request-automerge`-Schritt anschlieﾃ歹nd
# squasht.  `pull-requests: write` wird hier zusﾃ､tzlich benﾃｶtigt.
permissions:
  contents: write
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    env:
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python-Stack
        run: uv sync --frozen

      - name: Zieltag bestimmen
        id: target
        run: |
          if [[ -n "${{ inputs.target_date }}" ]]; then
            DATE="${{ inputs.target_date }}"
          else
            DATE=$(date -u -d "yesterday" +"%Y-%m-%d")
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "[score-daily] Zieltag: $DATE"

      - name: Scoring ausfﾃｼhren
        run: uv run python scripts/score_day.py --date "${{ steps.target.outputs.date }}"

      - name: Score-Stand-PR ﾃｶffnen
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SCORE_BOT_TOKEN }}
          add-paths: data/scores.parquet
          branch: bot/scores-${{ steps.target.outputs.date }}
          delete-branch: true
          commit-message: "score: Tageslauf ${{ steps.target.outputs.date }}"
          title: "score: Tageslauf ${{ steps.target.outputs.date }}"
          body: |
            Automatisierter Score-Stand fﾃｼr den Zieltag **${{ steps.target.outputs.date }}**.

            Erzeugt von `.github/workflows/score-daily.yml` (`scripts/score_day.py`).
            `validate-pr.yml` nickt diesen PR pass-through ab (keine `submissions/**`-ﾃ⏋derungen);
            anschlieﾃ歹nd squasht `peter-evans/enable-pull-request-automerge` ihn nach `main`.

      - name: Auto-merge aktivieren
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.SCORE_BOT_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Kein Score, kein PR
        if: steps.cpr.outputs.pull-request-operation == ''
        run: echo "[score-daily] Keine neuen Scores fﾃｼr ${{ steps.target.outputs.date }} (oder identisch zu HEAD)."
